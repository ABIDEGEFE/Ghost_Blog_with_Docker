apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy-gateway
  namespace: cms-iam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy-gateway
  template:
    metadata:
      labels:
        app: caddy-gateway
    spec:
      containers:
      - name: caddy
        image: caddy:2.7-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
      volumes:
      - name: config
        configMap:
          name: caddy-config
