apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
spec:
  ports:
    - port: 4180
      targetPort: 4180
  selector:
    app: oauth2-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: flask
spec:
  ports:
    - port: 5000
  selector:
    app: flask

---
apiVersion: v1
kind: Service
metadata:
  name: ghost
spec:
  #type: NodePort
  ports:
    - port: 2368
      targetPort: 2368
        #nodePort: "node-port"
  selector:
    app: ghost


---
# 1. Keycloak Service (Identity Provider)
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
        #nodePort: "node-port"
  selector:
    app: keycloak
---
# 2. Keycloak Database Service (Headless for StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
spec:
  clusterIP: None  # Headless service for stable network ID
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: keycloak-db
---
# 3. Ghost Database Service (Headless for StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: ghost-db
spec:
  clusterIP: None  # Headless service for stable network ID
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  selector:
    app: ghost-db
