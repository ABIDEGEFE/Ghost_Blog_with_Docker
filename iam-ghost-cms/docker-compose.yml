version: "3.9"

services:
  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/keycloak_db_password
    secrets:
      - keycloak_db_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  ghost-db:
    image: mysql:8.0
    container_name: ghost-db
    restart: always
    environment:
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD_FILE: /run/secrets/ghost_db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/ghost_db_password
    secrets:
      - ghost_db_password
    volumes:
      - ghost_db_data:/var/lib/mysql

  caddy:
    image: caddy:2
    container_name: caddy
    ports:
      - "80:80"
    volumes:
      - /etc/caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - ghost
      - oauth2-proxy
      - flask

  ghost:
    image: ghost:5
    container_name: ghost

    entrypoint: /ghost-entrypoint.sh
    command: ["node", "current/index.js"]

    depends_on:
      - ghost-db
    environment:
      NODE_ENV: production
      url: http://localhost

      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: ghost
      database__connection__database: ghost

      mail__transport: SMTP
      mail__options__host: smtp.gmail.com
      mail__options__port: 587
      mail__options__auth__user: agonaferdegefe@gmail.com
      mail__options__secure: false

    secrets:
      - ghost_db_password
      - smtp_password

    volumes:
      - ghost_data:/var/lib/ghost/content
      - /home/abinet/Desktop/ghost-cms/content/themes:/var/lib/ghost/content/themes
      - ./ghost-entrypoint.sh:/ghost-entrypoint.sh

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak

    entrypoint: ["/bin/sh", "/keycloak-entrypoint.sh"]
    command: start
    depends_on:
      - keycloak-db
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}

      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}

      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_RELATIVE_PATH: /
      KC_HTTP_ENABLED: true
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_PROXY: edge
    secrets:
      - keycloak_db_password
      - keycloak_admin_password
    volumes:
      - ./keycloak-entrypoint.sh:/keycloak-entrypoint.sh
    ports:
      - "8080:8080"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: always
    env_file:
     - .env
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: "your proxy client secret"
      OAUTH2_PROXY_COOKIE_SECRET: "your proxy cookie secret"

      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://keycloak:8080/realms/LearnMore
      OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/callback
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
        # OAUTH2_PROXY_UPSTREAMS: http://ghost:2368
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180

      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_OIDC_GROUPS_CLAIM: groups
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"

    secrets:
     - oauth2_client_secret
     - oauth2_cookie_secret

    depends_on:
     - keycloak

  flask:
    build: ./flask
    container_name: flask
    env_file:
      - .env
    secrets:
      - ghost_admin_api_key
    environment:
      GHOST_ADMIN_API_KEY_FILE: /run/secrets/ghost_admin_api_key
    command: flask run --host=0.0.0.0 --port=5000
    depends_on:
      - ghost
volumes:
  ghost_data:
  keycloak_db_data:
  ghost_db_data:

secrets:
  keycloak_db_password:
    file: ./secrets/keycloak_db_password.txt
  keycloak_admin_password:
    file: ./secrets/keycloak_admin_password.txt
  ghost_db_password:
    file: ./secrets/ghost_db_password.txt
  smtp_password:
    file: ./secrets/smtp_password.txt
  oauth2_client_secret:
    file: ./secrets/oauth2_client_secret.txt
  oauth2_cookie_secret:
    file: ./secrets/oauth2_cookie_secret.txt
  ghost_admin_api_key:
    file: ./secrets/ghost_admin_api_key.txt
